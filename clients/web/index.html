<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover"
/>
<meta name="theme-color" content="#0d1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>JARVIS</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --fg: #e6edf3;
    --fg-dim: #8b949e;
    --accent: #58a6ff;
    --you: #2ea043;
    --jarvis: #58a6ff;
    --err: #f85149;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter,
      "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    /* respect iPhone notch / home indicator */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    padding: 14px 18px;
    background: var(--bg-soft);
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }
  #status {
    margin-left: auto;
    font-size: 12px;
    color: var(--fg-dim);
  }
  #status.ok { color: var(--you); }
  #status.bad { color: var(--err); }

  #setup {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid #21262d;
  }
  #setup label {
    font-size: 12px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  #setup input {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 16px;
    width: 100%;
  }
  #setup button {
    background: var(--accent);
    border: 0;
    color: #0d1117;
    font-weight: 600;
    padding: 12px;
    border-radius: var(--radius);
    font-size: 15px;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 86%;
    padding: 10px 14px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.you {
    align-self: flex-end;
    background: rgba(46, 160, 67, 0.15);
    border: 1px solid rgba(46, 160, 67, 0.4);
  }
  .msg.jarvis {
    align-self: flex-start;
    background: rgba(88, 166, 255, 0.12);
    border: 1px solid rgba(88, 166, 255, 0.4);
  }
  .msg.err {
    align-self: flex-start;
    background: rgba(248, 81, 73, 0.15);
    border: 1px solid rgba(248, 81, 73, 0.4);
    color: var(--err);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .who {
    display: block;
    font-size: 11px;
    color: var(--fg-dim);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  footer {
    padding: 10px 12px;
    background: var(--bg-soft);
    border-top: 1px solid #21262d;
    display: flex;
    gap: 8px;
  }
  #input {
    flex: 1;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 16px;          /* >=16px stops iOS from zooming on focus */
  }
  #send, #mic {
    background: var(--accent);
    border: 0;
    color: #0d1117;
    font-weight: 600;
    padding: 0 18px;
    border-radius: var(--radius);
    font-size: 15px;
  }
  #send:disabled, #mic:disabled { opacity: 0.5; }
  #mic {
    padding: 0 14px;
    font-size: 18px;
    line-height: 1;
    min-width: 48px;
  }
  #mic.rec {
    background: var(--err);
    color: #fff;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7); }
    50%      { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0); }
  }
  #mic.busy {
    background: var(--fg-dim);
    color: #0d1117;
  }

  /* mac_control status bar */
  #macbar {
    padding: 8px 14px;
    background: var(--bg-soft);
    border-bottom: 1px solid #21262d;
    display: none;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  #macbar.show { display: flex; }
  #macbar .label {
    color: var(--fg-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 10px;
    background: rgba(139, 148, 158, 0.18);
    color: var(--fg-dim);
    font-weight: 600;
    font-size: 12px;
    border: 1px solid transparent;
  }
  .badge.on  { background: rgba(46,160,67,0.18);  color: #56d364; border-color: rgba(46,160,67,0.45); }
  .badge.off { background: rgba(139,148,158,0.10); color: #6e7681; }
  .badge.bad { background: rgba(248,81,73,0.18);  color: #f85149; border-color: rgba(248,81,73,0.45); }

  #emergency {
    margin-left: auto;
    background: var(--err);
    color: #fff;
    border: 0;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  #emergency.armed { background: var(--err); }
  #emergency.killed { background: var(--you); }

  /* pending action cards */
  #pending-area {
    padding: 0 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #pending-area:empty { padding: 0; }
  .pending-header {
    margin-top: 10px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-soft);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    font-size: 13px;
  }
  .pending-header .ph-count {
    font-weight: 700;
    color: var(--fg);
  }
  .pending-header .ph-hint {
    color: var(--fg-dim);
    font-size: 12px;
  }
  .pending-header button {
    margin-left: auto;
    background: var(--err);
    color: #fff;
    border: 0;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 12px;
  }
  .pending {
    margin-top: 10px;
    padding: 12px 14px;
    border-radius: var(--radius);
    background: rgba(88,166,255,0.10);
    border: 1px solid rgba(88,166,255,0.45);
  }
  .pending.tier4 {
    background: rgba(248,81,73,0.10);
    border-color: rgba(248,81,73,0.45);
  }
  .pending .ptier {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--fg-dim);
    margin-bottom: 4px;
  }
  .pending .psum {
    font-size: 14px;
    color: var(--fg);
    margin-bottom: 10px;
    word-wrap: break-word;
  }
  .pending .prow {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pending input[type="password"] {
    flex: 1;
    min-width: 140px;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 14px;
  }
  .pending button {
    background: var(--accent);
    color: #0d1117;
    border: 0;
    padding: 8px 14px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 13px;
  }
  .pending button.deny {
    background: var(--bg);
    color: var(--fg-dim);
    border: 1px solid #30363d;
  }
</style>
</head>
<body>
<header>
  <h1>JARVIS</h1>
  <span id="status">disconnected</span>
</header>

<section id="macbar">
  <span class="label">mac</span>
  <span class="badge" id="b-mac">off</span>
  <span class="badge" id="b-t2">T2</span>
  <span class="badge" id="b-t3">T3</span>
  <span class="badge" id="b-t4">T4</span>
  <span class="badge" id="b-kill">armed</span>
  <button id="emergency" class="armed">⏹ Stop</button>
</section>

<section id="pending-area"></section>

<section id="setup">
  <label for="server">Server URL</label>
  <input
    id="server"
    type="url"
    inputmode="url"
    autocomplete="off"
    placeholder="http://192.168.1.50:8000"
  />
  <label for="token">Bearer token</label>
  <input
    id="token"
    type="password"
    autocomplete="off"
    placeholder="JARVIS_AUTH_TOKEN from server .env"
  />
  <button id="connect">Connect</button>
</section>

<main id="log" aria-live="polite"></main>

<footer>
  <input
    id="input"
    type="text"
    placeholder="Ask JARVIS…"
    enterkeyhint="send"
    autocapitalize="sentences"
    autocomplete="off"
  />
  <button id="mic" disabled title="Tap to record, tap again to send">🎤</button>
  <button id="send" disabled>Send</button>
</footer>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const logEl = $("log");
  const statusEl = $("status");
  const setupEl = $("setup");
  const serverEl = $("server");
  const tokenEl = $("token");
  const inputEl = $("input");
  const sendEl = $("send");
  const micEl = $("mic");
  const connectEl = $("connect");
  const macbarEl = $("macbar");
  const pendingArea = $("pending-area");
  const emergencyEl = $("emergency");
  const bMac = $("b-mac");
  const bT2 = $("b-t2");
  const bT3 = $("b-t3");
  const bT4 = $("b-t4");
  const bKill = $("b-kill");

  // Persist preferences locally — never sent anywhere we don't control.
  serverEl.value = localStorage.getItem("jarvis.url") || location.origin;
  tokenEl.value = localStorage.getItem("jarvis.token") || "";

  let socket = null;

  function setStatus(text, klass) {
    statusEl.textContent = text;
    statusEl.className = klass || "";
  }

  function addMsg(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    const who = document.createElement("span");
    who.className = "who";
    who.textContent = role === "you" ? "you" :
                       role === "jarvis" ? "jarvis" : "error";
    const body = document.createElement("span");
    body.textContent = text;
    div.appendChild(who);
    div.appendChild(body);
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function wsUrlFor(httpUrl, token) {
    const u = new URL(httpUrl);
    u.protocol = u.protocol === "https:" ? "wss:" : "ws:";
    u.pathname = u.pathname.replace(/\/$/, "") + "/ws";
    u.search = "?token=" + encodeURIComponent(token);
    return u.toString();
  }

  function connect() {
    const url = serverEl.value.trim().replace(/\/$/, "");
    const token = tokenEl.value.trim();
    if (!url || !token) {
      addMsg("Enter both server URL and token.", "err");
      return;
    }
    localStorage.setItem("jarvis.url", url);
    localStorage.setItem("jarvis.token", token);

    setStatus("connecting…");
    if (socket) { try { socket.close(); } catch {} }
    socket = new WebSocket(wsUrlFor(url, token));

    socket.onopen = () => {
      setStatus("connected", "ok");
      setupEl.style.display = "none";
      sendEl.disabled = false;
      micEl.disabled = false;
      macbarEl.classList.add("show");
      inputEl.focus();
      // iOS Safari blocks SpeechSynthesis until a user-gesture-triggered
      // utterance fires once. The Connect tap counts — speak an empty
      // string so the *real* reply later actually plays.
      unlockSpeech();
      // Initial mac_control status fetch + start the slow background poll.
      refreshMac();
      startMacPoll();
    };
    socket.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.error) addMsg(msg.error, "err");
        else if (msg.reply) {
          addMsg(msg.reply, "jarvis");
          speak(msg.reply);
        }
        // Replies often follow a mac_action tool call — refresh status
        // immediately so pending cards appear without waiting for poll.
        refreshMac();
      } catch (exc) {
        addMsg("Bad message from server: " + exc, "err");
      }
    };
    socket.onerror = () => setStatus("error", "bad");
    socket.onclose = (ev) => {
      sendEl.disabled = true;
      micEl.disabled = true;
      const reason = ev.reason || ("code " + ev.code);
      setStatus("disconnected (" + reason + ")", "bad");
      if (ev.code === 4401) {
        addMsg("Authentication rejected — check your token.", "err");
        setupEl.style.display = "";
      } else if (ev.code === 4429) {
        addMsg("Rate limited — slow down.", "err");
      }
    };
  }

  function send() {
    const text = inputEl.value.trim();
    if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
    addMsg(text, "you");
    socket.send(JSON.stringify({ text }));
    inputEl.value = "";
  }

  // ─── Voice: push-to-talk → /audio → speak reply ─────────────────────
  // We record with MediaRecorder (only audio format the browser will
  // pick natively), decode it back into PCM via the WebAudio API,
  // resample to 16 kHz mono, wrap it in a WAV container and POST to the
  // existing /audio endpoint. The server transcribes with Whisper, runs
  // the Brain, and returns {reply, transcript} — we render both and
  // speak the reply via SpeechSynthesis.

  let mediaStream = null;
  let mediaRecorder = null;
  let recordChunks = [];
  let isRecording = false;
  let speechVoice = null;

  function unlockSpeech() {
    if (!("speechSynthesis" in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(" ");
      u.volume = 0;
      speechSynthesis.speak(u);
    } catch {}
    // Voice list is populated async on some browsers.
    const pick = () => {
      const voices = speechSynthesis.getVoices();
      speechVoice =
        voices.find((v) => v.lang === "de-DE") ||
        voices.find((v) => v.lang && v.lang.startsWith("de")) ||
        voices[0] || null;
    };
    pick();
    speechSynthesis.onvoiceschanged = pick;
  }

  function speak(text) {
    if (!("speechSynthesis" in window) || !text) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "de-DE";
    if (speechVoice) u.voice = speechVoice;
    speechSynthesis.speak(u);
  }

  async function ensureMic() {
    if (mediaStream) return mediaStream;
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      },
    });
    return mediaStream;
  }

  function pickMimeType() {
    const candidates = [
      "audio/webm;codecs=opus",
      "audio/webm",
      "audio/mp4",       // iOS Safari
      "audio/ogg;codecs=opus",
    ];
    for (const t of candidates) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
    }
    return "";
  }

  async function startRecording() {
    if (isRecording) return;
    speechSynthesis.cancel();
    try {
      await ensureMic();
    } catch (err) {
      addMsg("Mic permission denied: " + (err.message || err), "err");
      return;
    }
    const mime = pickMimeType();
    recordChunks = [];
    mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {});
    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) recordChunks.push(e.data);
    };
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordChunks, { type: mediaRecorder.mimeType || "audio/webm" });
      if (blob.size < 1000) {
        addMsg("Recording too short.", "err");
        setMicState("idle");
        return;
      }
      setMicState("busy");
      try {
        const wav = await blobToWav16k(blob);
        await postAudio(wav);
      } catch (err) {
        addMsg("Audio upload failed: " + (err.message || err), "err");
      } finally {
        setMicState("idle");
      }
    };
    mediaRecorder.start();
    isRecording = true;
    setMicState("rec");
  }

  function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    try { mediaRecorder.stop(); } catch {}
  }

  function setMicState(state) {
    micEl.classList.remove("rec", "busy");
    if (state === "rec") {
      micEl.classList.add("rec");
      micEl.textContent = "■";
    } else if (state === "busy") {
      micEl.classList.add("busy");
      micEl.textContent = "…";
    } else {
      micEl.textContent = "🎤";
    }
  }

  async function blobToWav16k(blob) {
    const arrayBuf = await blob.arrayBuffer();
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    const decoded = await new Promise((resolve, reject) => {
      // Callback form for Safari compatibility.
      ctx.decodeAudioData(arrayBuf.slice(0), resolve, reject);
    });

    // Down-mix to mono.
    let mono;
    if (decoded.numberOfChannels === 1) {
      mono = decoded.getChannelData(0);
    } else {
      mono = new Float32Array(decoded.length);
      for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
        const data = decoded.getChannelData(ch);
        for (let i = 0; i < data.length; i++) mono[i] += data[i] / decoded.numberOfChannels;
      }
    }

    // Linear resample to 16 kHz. Cheap but plenty for speech.
    const target = 16000;
    let pcmF32;
    if (decoded.sampleRate === target) {
      pcmF32 = mono;
    } else {
      const ratio = decoded.sampleRate / target;
      const outLen = Math.floor(mono.length / ratio);
      pcmF32 = new Float32Array(outLen);
      for (let i = 0; i < outLen; i++) {
        const idx = i * ratio;
        const i0 = Math.floor(idx);
        const i1 = Math.min(i0 + 1, mono.length - 1);
        const frac = idx - i0;
        pcmF32[i] = mono[i0] * (1 - frac) + mono[i1] * frac;
      }
    }

    // Float [-1, 1] → int16 PCM → WAV container.
    const buf = new ArrayBuffer(44 + pcmF32.length * 2);
    const view = new DataView(buf);
    const writeStr = (off, str) => {
      for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
    };
    writeStr(0, "RIFF");
    view.setUint32(4, 36 + pcmF32.length * 2, true);
    writeStr(8, "WAVE");
    writeStr(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);          // PCM
    view.setUint16(22, 1, true);          // mono
    view.setUint32(24, target, true);
    view.setUint32(28, target * 2, true); // byte rate
    view.setUint16(32, 2, true);          // block align
    view.setUint16(34, 16, true);         // bits per sample
    writeStr(36, "data");
    view.setUint32(40, pcmF32.length * 2, true);
    let off = 44;
    for (let i = 0; i < pcmF32.length; i++) {
      const s = Math.max(-1, Math.min(1, pcmF32[i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    ctx.close();
    return new Blob([buf], { type: "audio/wav" });
  }

  async function postAudio(wavBlob) {
    const url = (serverEl.value || "").trim().replace(/\/$/, "") + "/audio";
    const token = (tokenEl.value || "").trim();
    const fd = new FormData();
    fd.append("file", wavBlob, "speech.wav");
    const res = await fetch(url, {
      method: "POST",
      headers: { Authorization: "Bearer " + token },
      body: fd,
    });
    if (!res.ok) {
      let detail = "HTTP " + res.status;
      try {
        const j = await res.json();
        if (j.detail) detail += " — " + j.detail;
      } catch {}
      addMsg("audio /upload failed: " + detail, "err");
      return;
    }
    const data = await res.json();
    if (data.transcript) addMsg(data.transcript, "you");
    if (data.reply) {
      addMsg(data.reply, "jarvis");
      speak(data.reply);
    }
  }

  micEl.addEventListener("click", () => {
    if (isRecording) stopRecording();
    else startRecording();
  });

  // ─── mac_control: status badges, pending-action cards, kill switch ───
  let macPollTimer = null;

  async function authedFetch(path, init) {
    const url = (serverEl.value || "").trim().replace(/\/$/, "") + path;
    const token = (tokenEl.value || "").trim();
    const opts = init ? { ...init } : {};
    opts.headers = {
      ...(opts.headers || {}),
      Authorization: "Bearer " + token,
    };
    return fetch(url, opts);
  }

  function startMacPoll() {
    if (macPollTimer) clearInterval(macPollTimer);
    // 10 s slow poll — refreshMac() is also called after every chat
    // reply, so this is just a safety net for confirmations that
    // expired or were triggered by another client.
    macPollTimer = setInterval(refreshMac, 10000);
  }

  async function refreshMac() {
    let data;
    try {
      const res = await authedFetch("/permissions");
      if (!res.ok) return;
      data = await res.json();
    } catch { return; }
    renderBadges(data);
    renderPending(data.pending || []);
  }

  function renderBadges(d) {
    bMac.textContent = d.enabled ? "mac on" : "mac off";
    bMac.className = "badge " + (d.enabled ? "on" : "off");

    bT2.textContent = "T2 " + (d.tier2_unlocked ? "✓" : "lock");
    bT2.className   = "badge " + (d.tier2_unlocked ? "on" : "off");

    bT3.textContent = "T3 ask";
    bT3.className   = "badge " + (d.enabled ? "on" : "off");

    bT4.textContent = "T4 " + (d.tier4_available ? "pw" : "off");
    bT4.className   = "badge " + (d.tier4_available ? "on" : "off");

    const killed = d.kill_switch && d.kill_switch.killed;
    bKill.textContent = killed ? "KILLED" : "armed";
    bKill.className   = "badge " + (killed ? "bad" : "on");
    emergencyEl.textContent = killed ? "▶ Resume" : "⏹ Stop";
    emergencyEl.className   = killed ? "killed" : "armed";
  }

  function renderPending(items) {
    pendingArea.innerHTML = "";
    if (items.length === 0) return;

    // Header card with count + bulk cancel — appears only when there's
    // at least one pending. Helps cut through retry-loop pileups.
    const header = document.createElement("div");
    header.className = "pending-header";
    const count = document.createElement("span");
    count.className = "ph-count";
    count.textContent = `Anstehende Aktionen: ${items.length}`;
    const hint = document.createElement("span");
    hint.className = "ph-hint";
    const t3 = items.filter(p => p.tier === 3).length;
    const t4 = items.filter(p => p.tier === 4).length;
    const parts = [];
    if (t3) parts.push(`${t3}× T3`);
    if (t4) parts.push(`${t4}× T4`);
    hint.textContent = parts.join(" · ");
    const clearBtn = document.createElement("button");
    clearBtn.textContent = "Alle abbrechen";
    clearBtn.addEventListener("click", clearAllPending);
    header.append(count, hint, clearBtn);
    pendingArea.appendChild(header);

    for (const p of items) {
      const card = document.createElement("div");
      card.className = "pending" + (p.tier === 4 ? " tier4" : "");
      const tierLabel = document.createElement("span");
      tierLabel.className = "ptier";
      tierLabel.textContent = `Tier ${p.tier} · ${p.action} · ${p.age_s}s alt`;
      const sum = document.createElement("div");
      sum.className = "psum";
      sum.textContent = p.summary;
      const row = document.createElement("div");
      row.className = "prow";

      if (p.requires_password) {
        const pw = document.createElement("input");
        pw.type = "password";
        pw.placeholder = "JARVIS-Passwort";
        pw.autocomplete = "off";
        const ok = document.createElement("button");
        ok.textContent = "✓ Confirm";
        ok.addEventListener("click", () => confirmTier4(p.id, pw.value, card));
        pw.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); ok.click(); }
        });
        const deny = document.createElement("button");
        deny.className = "deny";
        deny.textContent = "✗ Cancel";
        deny.addEventListener("click", () => confirmTier3(p.id, false, card));
        row.append(pw, ok, deny);
      } else {
        const ok = document.createElement("button");
        ok.textContent = "✓ Yes";
        ok.addEventListener("click", () => confirmTier3(p.id, true, card));
        const deny = document.createElement("button");
        deny.className = "deny";
        deny.textContent = "✗ No";
        deny.addEventListener("click", () => confirmTier3(p.id, false, card));
        row.append(ok, deny);
      }

      card.append(tierLabel, sum, row);
      pendingArea.appendChild(card);
    }
  }

  async function confirmTier3(id, approve, card) {
    card.style.opacity = "0.5";
    try {
      const res = await authedFetch("/confirm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, approve }),
      });
      const data = await res.json();
      const text = data.result || data.reason || JSON.stringify(data);
      addMsg((approve ? "✓ " : "✗ ") + text,
             data.status === "ok" ? "jarvis" : "err");
      if (data.status === "ok" && data.result) speak(data.result);
    } catch (exc) {
      addMsg("Confirm fehlgeschlagen: " + exc, "err");
    } finally {
      refreshMac();
    }
  }

  async function confirmTier4(id, password, card) {
    if (!password) {
      addMsg("Passwort eingeben.", "err");
      return;
    }
    card.style.opacity = "0.5";
    try {
      const res = await authedFetch("/tier4-confirm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, password }),
      });
      const data = await res.json();
      const text = data.result || data.reason || JSON.stringify(data);
      addMsg((data.status === "ok" ? "✓ " : "✗ ") + text,
             data.status === "ok" ? "jarvis" : "err");
      if (data.status === "ok" && data.result) speak(data.result);
    } catch (exc) {
      addMsg("Tier-4-Confirm fehlgeschlagen: " + exc, "err");
    } finally {
      refreshMac();
    }
  }

  async function clearAllPending() {
    try {
      const res = await authedFetch("/pending/clear", { method: "POST" });
      const data = await res.json();
      addMsg(`🧹 ${data.cancelled} anstehende Aktion(en) abgebrochen.`, "jarvis");
    } catch (exc) {
      addMsg("Pending-Clear fehlgeschlagen: " + exc, "err");
    } finally {
      refreshMac();
    }
  }

  emergencyEl.addEventListener("click", async () => {
    const killed = emergencyEl.classList.contains("killed");
    try {
      const res = await authedFetch(killed ? "/resume" : "/emergency-stop",
                                    { method: "POST" });
      const data = await res.json();
      addMsg(killed ? "Wieder aktiv." :
                      `🛑 Kill switch: ${data.reason || "active"}`,
             killed ? "jarvis" : "err");
    } catch (exc) {
      addMsg("Kill-Switch-Toggle fehlgeschlagen: " + exc, "err");
    } finally {
      refreshMac();
    }
  });

  connectEl.addEventListener("click", connect);
  sendEl.addEventListener("click", send);
  inputEl.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); send(); }
  });

  // Auto-connect if both fields look populated and a session is fresh.
  if (serverEl.value && tokenEl.value) {
    // small delay so the user can cancel by tapping Connect again
    setTimeout(() => { if (!socket) connect(); }, 300);
  }
})();
</script>
</body>
</html>
