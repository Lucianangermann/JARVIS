<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover"
/>
<meta name="theme-color" content="#0d1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>JARVIS</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --fg: #e6edf3;
    --fg-dim: #8b949e;
    --accent: #58a6ff;
    --you: #2ea043;
    --jarvis: #58a6ff;
    --err: #f85149;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter,
      "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    /* respect iPhone notch / home indicator */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    padding: 14px 18px;
    background: var(--bg-soft);
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }
  #status {
    margin-left: auto;
    font-size: 12px;
    color: var(--fg-dim);
  }
  #status.ok { color: var(--you); }
  #status.bad { color: var(--err); }

  #setup {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid #21262d;
  }
  #setup label {
    font-size: 12px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  #setup input {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 16px;
    width: 100%;
  }
  #setup button {
    background: var(--accent);
    border: 0;
    color: #0d1117;
    font-weight: 600;
    padding: 12px;
    border-radius: var(--radius);
    font-size: 15px;
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 86%;
    padding: 10px 14px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.you {
    align-self: flex-end;
    background: rgba(46, 160, 67, 0.15);
    border: 1px solid rgba(46, 160, 67, 0.4);
  }
  .msg.jarvis {
    align-self: flex-start;
    background: rgba(88, 166, 255, 0.12);
    border: 1px solid rgba(88, 166, 255, 0.4);
  }
  .msg.err {
    align-self: flex-start;
    background: rgba(248, 81, 73, 0.15);
    border: 1px solid rgba(248, 81, 73, 0.4);
    color: var(--err);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .who {
    display: block;
    font-size: 11px;
    color: var(--fg-dim);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  footer {
    padding: 10px 12px;
    background: var(--bg-soft);
    border-top: 1px solid #21262d;
    display: flex;
    gap: 8px;
  }
  #input {
    flex: 1;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid #30363d;
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 16px;          /* >=16px stops iOS from zooming on focus */
  }
  #send {
    background: var(--accent);
    border: 0;
    color: #0d1117;
    font-weight: 600;
    padding: 0 18px;
    border-radius: var(--radius);
    font-size: 15px;
  }
  #send:disabled { opacity: 0.5; }
</style>
</head>
<body>
<header>
  <h1>JARVIS</h1>
  <span id="status">disconnected</span>
</header>

<section id="setup">
  <label for="server">Server URL</label>
  <input
    id="server"
    type="url"
    inputmode="url"
    autocomplete="off"
    placeholder="http://192.168.1.50:8000"
  />
  <label for="token">Bearer token</label>
  <input
    id="token"
    type="password"
    autocomplete="off"
    placeholder="JARVIS_AUTH_TOKEN from server .env"
  />
  <button id="connect">Connect</button>
</section>

<main id="log" aria-live="polite"></main>

<footer>
  <input
    id="input"
    type="text"
    placeholder="Ask JARVIS…"
    enterkeyhint="send"
    autocapitalize="sentences"
    autocomplete="off"
  />
  <button id="send" disabled>Send</button>
</footer>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const logEl = $("log");
  const statusEl = $("status");
  const setupEl = $("setup");
  const serverEl = $("server");
  const tokenEl = $("token");
  const inputEl = $("input");
  const sendEl = $("send");
  const connectEl = $("connect");

  // Persist preferences locally — never sent anywhere we don't control.
  serverEl.value = localStorage.getItem("jarvis.url") || location.origin;
  tokenEl.value = localStorage.getItem("jarvis.token") || "";

  let socket = null;

  function setStatus(text, klass) {
    statusEl.textContent = text;
    statusEl.className = klass || "";
  }

  function addMsg(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    const who = document.createElement("span");
    who.className = "who";
    who.textContent = role === "you" ? "you" :
                       role === "jarvis" ? "jarvis" : "error";
    const body = document.createElement("span");
    body.textContent = text;
    div.appendChild(who);
    div.appendChild(body);
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function wsUrlFor(httpUrl, token) {
    const u = new URL(httpUrl);
    u.protocol = u.protocol === "https:" ? "wss:" : "ws:";
    u.pathname = u.pathname.replace(/\/$/, "") + "/ws";
    u.search = "?token=" + encodeURIComponent(token);
    return u.toString();
  }

  function connect() {
    const url = serverEl.value.trim().replace(/\/$/, "");
    const token = tokenEl.value.trim();
    if (!url || !token) {
      addMsg("Enter both server URL and token.", "err");
      return;
    }
    localStorage.setItem("jarvis.url", url);
    localStorage.setItem("jarvis.token", token);

    setStatus("connecting…");
    if (socket) { try { socket.close(); } catch {} }
    socket = new WebSocket(wsUrlFor(url, token));

    socket.onopen = () => {
      setStatus("connected", "ok");
      setupEl.style.display = "none";
      sendEl.disabled = false;
      inputEl.focus();
    };
    socket.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.error) addMsg(msg.error, "err");
        else if (msg.reply) addMsg(msg.reply, "jarvis");
      } catch (exc) {
        addMsg("Bad message from server: " + exc, "err");
      }
    };
    socket.onerror = () => setStatus("error", "bad");
    socket.onclose = (ev) => {
      sendEl.disabled = true;
      const reason = ev.reason || ("code " + ev.code);
      setStatus("disconnected (" + reason + ")", "bad");
      if (ev.code === 4401) {
        addMsg("Authentication rejected — check your token.", "err");
        setupEl.style.display = "";
      } else if (ev.code === 4429) {
        addMsg("Rate limited — slow down.", "err");
      }
    };
  }

  function send() {
    const text = inputEl.value.trim();
    if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
    addMsg(text, "you");
    socket.send(JSON.stringify({ text }));
    inputEl.value = "";
  }

  connectEl.addEventListener("click", connect);
  sendEl.addEventListener("click", send);
  inputEl.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); send(); }
  });

  // Auto-connect if both fields look populated and a session is fresh.
  if (serverEl.value && tokenEl.value) {
    // small delay so the user can cancel by tapping Connect again
    setTimeout(() => { if (!socket) connect(); }, 300);
  }
})();
</script>
</body>
</html>
