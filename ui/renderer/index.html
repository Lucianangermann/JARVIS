<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src https://fonts.gstatic.com;
                 img-src 'self' data:;
                 script-src 'self';
                 connect-src 'self'
                   ws://127.0.0.1:* ws://localhost:*
                   wss://127.0.0.1:* wss://localhost:*
                   http://127.0.0.1:* http://localhost:*
                   https://127.0.0.1:* https://localhost:*;" />
  <title>JARVIS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/hud.css" />
</head>
<body data-state="idle" data-tier="2">

  <div id="stage">
    <!-- IDLE: small glowing orb with wordmark across the middle -->
    <div id="orb" title="Click to expand">
      <span class="orb-wordmark">JARVIS</span>
    </div>

    <!-- IDLE: ambient particle aura ringing the orb. Sibling of #orb
         (NOT a child) so the orb-breathe scale animation doesn't
         pull the particles in and out with it. Hidden in HUD states
         via the body[data-state] selector in hud.css. -->
    <div id="orb-aura" aria-hidden="true">
      <span class="orb-particle" style="--a:   0deg;"></span>
      <span class="orb-particle" style="--a:  30deg;"></span>
      <span class="orb-particle" style="--a:  60deg;"></span>
      <span class="orb-particle" style="--a:  90deg;"></span>
      <span class="orb-particle" style="--a: 120deg;"></span>
      <span class="orb-particle" style="--a: 150deg;"></span>
      <span class="orb-particle" style="--a: 180deg;"></span>
      <span class="orb-particle" style="--a: 210deg;"></span>
      <span class="orb-particle" style="--a: 240deg;"></span>
      <span class="orb-particle" style="--a: 270deg;"></span>
      <span class="orb-particle" style="--a: 300deg;"></span>
      <span class="orb-particle" style="--a: 330deg;"></span>
    </div>

    <!-- ACTIVE / SPEAKING / PROCESSING: full HUD -->
    <div id="hud">
      <!-- Corner brackets (drawn with CSS, see hud.css) -->
      <span class="bracket tl"></span>
      <span class="bracket tr"></span>
      <span class="bracket bl"></span>
      <span class="bracket br"></span>

      <!-- Floating particle layer (populated by hud.js) -->
      <div class="particles" aria-hidden="true"></div>

      <!-- Top status bar -->
      <div class="status-bar drag">
        <span class="brand">
          <span class="status-dot" id="conn-dot"></span>
          J.A.R.V.I.S. v1.0
        </span>
        <span class="center tabular" id="clock">00:00:00</span>
        <span class="right">
          <span id="conn-label">OFFLINE</span>
          <button id="kill-badge" class="no-drag"
                  type="button"
                  title="Click to trigger emergency stop (Esc)">
            STOP
          </button>
          <span class="tier-indicator no-drag" title="Permission tier">
            <span class="tier-dot"></span>
            <span class="tier-dot"></span>
            <span class="tier-dot"></span>
            <span class="tier-dot"></span>
          </span>
        </span>
      </div>

      <!-- Pending Tier-2/3/4 actions awaiting approval. Populated by
           pending.js as an overlay above the emblem+chat row so a
           confirmation request is unmissable; collapses to nothing
           (display:none via :empty) when no actions are pending. -->
      <div id="pending-stack" aria-live="polite"></div>

      <!-- Centre row: emblem + chat -->
      <div class="stage-row">
        <div class="core-wrap" id="core-wrap">
          <!-- Subtle state-reactive backdrop. Sits behind the emblem so
               the amplitude pulse shows through the gaps between rings. -->
          <canvas id="visualizer" width="280" height="280"></canvas>

          <!-- Layered J.A.R.V.I.S emblem.
               viewBox is symmetric around 0,0 so radii are easy to reason
               about. Each <g> layer carries a class so the CSS can animate
               selected ones independently.

               Layer order (outer → inner):
                 outer-ring        thin enclosing circle
                 outer-accents     four bright cyan arc highlights
                 progress-arc      cluster of small bars at top
                 ticks-long        60 long radial ticks
                 ticks-short       48 short radial ticks
                 dots-ring         24 dots (most dim, four bright)
                 bracket-arcs      four large glowing bracket arcs (THE feature)
                 inner-disc        dark circle behind the wordmark
                 wordmark          "J.A.R.V.I.S" centred
          -->
          <svg id="emblem" class="emblem"
               viewBox="-160 -160 320 320"
               xmlns="http://www.w3.org/2000/svg"
               aria-hidden="true">

            <!-- 1. Outer ring: dim circle -->
            <circle class="outer-ring"
                    cx="0" cy="0" r="148"
                    fill="none" stroke="rgba(0,212,255,0.22)" stroke-width="0.8"/>

            <!-- 2. Outer accents: small bright segments at four points,
                 rotates slowly so the design "lives". -->
            <g class="outer-accents">
              <path d="M -148 -10 A 148 148 0 0 1 -130 -70" stroke="var(--jarvis-glow)" stroke-width="2.2" fill="none"/>
              <path d="M  130  70 A 148 148 0 0 1  148  10" stroke="var(--jarvis-glow)" stroke-width="2.2" fill="none"/>
              <path d="M  -90 -118 A 148 148 0 0 1  -50 -139" stroke="rgba(0,212,255,0.65)" stroke-width="1.5" fill="none"/>
              <path d="M   90  118 A 148 148 0 0 1   50  139" stroke="rgba(0,212,255,0.65)" stroke-width="1.5" fill="none"/>
            </g>

            <!-- 3. Progress arc: cluster of small bars near top.
                 13 rectangles laid along the arc at r=128. -->
            <g class="progress-arc">
              <g transform="rotate(-30)"><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(-25)"><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(-20)"><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(-15)"><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(-10)"><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-glow)"/></g>
              <g transform="rotate(-5)" ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-glow)"/></g>
              <g transform="rotate(0)"  ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-glow)"/></g>
              <g transform="rotate(5)"  ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-glow)"/></g>
              <g transform="rotate(10)" ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-glow)"/></g>
              <g transform="rotate(15)" ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(20)" ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(25)" ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
              <g transform="rotate(30)" ><rect x="-1.5" y="-132" width="3" height="7" rx="0.5" fill="var(--jarvis-primary)"/></g>
            </g>

            <!-- 4. Long ticks ring: 60 ticks from r=120 down to r=112 -->
            <!-- Drawn programmatically in JS at boot to keep the markup
                 readable. emblem.js inserts <line> elements into this <g>. -->
            <g class="ticks-long"   data-count="60" data-r1="120" data-r2="112" data-stroke="rgba(0,212,255,0.7)" data-width="1.2"></g>
            <g class="ticks-short"  data-count="48" data-r1="100" data-r2="96"  data-stroke="rgba(0,212,255,0.45)" data-width="1"></g>

            <!-- 5. Dotted ring: 24 small dots at r=88. emblem.js fills these too. -->
            <g class="dots-ring"    data-count="24" data-r="88" data-dot-r="1.4"
                                    data-fill="rgba(0,212,255,0.5)"
                                    data-highlights="0,6,12,18"
                                    data-highlight-fill="var(--jarvis-glow)"
                                    data-highlight-r="2.2"></g>

            <!-- 6. Bracket arcs — the four bright featured arcs. -->
            <g class="bracket-arcs">
              <!-- top -->
              <path d="M -42 -73 A 84 84 0 0 1 42 -73" stroke="var(--jarvis-glow)" stroke-width="6" stroke-linecap="round" fill="none"/>
              <!-- right -->
              <path d="M 73 -42 A 84 84 0 0 1 73 42" stroke="var(--jarvis-glow)" stroke-width="6" stroke-linecap="round" fill="none"/>
              <!-- bottom -->
              <path d="M 42 73 A 84 84 0 0 1 -42 73" stroke="var(--jarvis-glow)" stroke-width="6" stroke-linecap="round" fill="none"/>
              <!-- left -->
              <path d="M -73 42 A 84 84 0 0 1 -73 -42" stroke="var(--jarvis-glow)" stroke-width="6" stroke-linecap="round" fill="none"/>
            </g>

            <!-- 7. Inner disc -->
            <circle class="inner-disc" cx="0" cy="0" r="58"
                    fill="rgba(0,10,30,0.6)"
                    stroke="rgba(0,212,255,0.4)" stroke-width="0.6"/>

            <!-- 8. Wordmark.
                 Two lines: the big "J.A.R.V.I.S" plus a dim tagline.
                 Drawn directly in the SVG so it sits in-emblem, scales
                 with everything else, and benefits from the same drop-
                 shadow glow filter on the parent. -->
            <text class="wordmark" x="0" y="-2"
                  text-anchor="middle"
                  font-family="Orbitron, sans-serif"
                  font-size="22"
                  letter-spacing="2"
                  font-weight="700"
                  fill="var(--jarvis-glow)">J.A.R.V.I.S</text>
            <text class="wordmark-sub" x="0" y="16"
                  text-anchor="middle"
                  font-family="Orbitron, sans-serif"
                  font-size="5.5"
                  letter-spacing="2.4"
                  font-weight="500"
                  fill="rgba(0, 212, 255, 0.65)">Just A Rather Very Intelligent System</text>
          </svg>
        </div>

        <div class="chat-pane" id="chat-pane">
          <!-- Populated by app.js -->
        </div>
      </div>

      <!-- Smart Home mini-panel (shown/hidden by ⌂ button) -->
      <div id="sh-panel" class="sh-panel" hidden>
        <div class="sh-row">
          <button class="sh-btn" id="sh-all-on"  type="button">💡 AN</button>
          <button class="sh-btn" id="sh-all-off" type="button">💡 AUS</button>
          <div class="sh-bright-row">
            <button class="sh-bright" data-level="25"  type="button">25%</button>
            <button class="sh-bright" data-level="50"  type="button">50%</button>
            <button class="sh-bright" data-level="80"  type="button">80%</button>
            <button class="sh-bright" data-level="100" type="button">MAX</button>
          </div>
          <button class="sh-close-btn" id="sh-panel-close" type="button">✕</button>
        </div>
        <div class="sh-row">
          <button class="sh-color" data-color="weiß"   style="background:#fff;border-color:#999" title="Weiß"></button>
          <button class="sh-color" data-color="rot"     style="background:#f00" title="Rot"></button>
          <button class="sh-color" data-color="gelb"   style="background:#ffd700" title="Gelb"></button>
          <button class="sh-color" data-color="grün"   style="background:#00c800" title="Grün"></button>
          <button class="sh-color" data-color="cyan"   style="background:#00dcff" title="Cyan"></button>
          <button class="sh-color" data-color="blau"   style="background:#0044ff" title="Blau"></button>
          <button class="sh-color" data-color="lila"   style="background:#8000c8" title="Lila"></button>
          <button class="sh-color" data-color="orange" style="background:#ff8c00" title="Orange"></button>
        </div>
        <div class="sh-row sh-scenes">
          <button class="sh-scene-btn" data-scene="entspannen" type="button">😌 Relax</button>
          <button class="sh-scene-btn" data-scene="arbeiten"   type="button">💼 Arbeit</button>
          <button class="sh-scene-btn" data-scene="kinoabend"  type="button">🎬 Kino</button>
          <button class="sh-scene-btn" data-scene="gute_nacht" type="button">🌙 Nacht</button>
          <button class="sh-scene-btn" data-scene="party"      type="button">🎉 Party</button>
        </div>
      </div>

      <!-- Security mini-panel (shown/hidden by 🔒 button) -->
      <div id="sec-panel" class="sh-panel" hidden>
        <div class="sh-row">
          <span id="sec-health" style="font-size:11px;letter-spacing:.08em;color:var(--jarvis-primary);flex:1;">CPU — · RAM — · DISK — · AKKU —</span>
          <button class="sh-close-btn" id="sec-panel-close" type="button">✕</button>
        </div>
        <div class="sh-row">
          <button class="sh-btn" id="sec-arm"    type="button">🔒 ARM (WEG)</button>
          <button class="sh-btn" id="sec-disarm" type="button">🔓 AUS</button>
          <button class="sh-btn" id="sec-status" type="button">STATUS</button>
        </div>
        <div class="sh-row">
          <button class="sh-btn" id="sec-door" type="button">📷 Wer an der Tür?</button>
          <button class="sh-btn" id="sec-net"  type="button">🌐 Netzwerk</button>
        </div>
        <div class="sh-row">
          <button class="sh-btn" id="sec-sos" type="button"
                  style="flex:1;background:#3a0d0d;border-color:#ff3030;color:#ff6a6a;font-weight:700;">
            🚨 SOS NOTFALL</button>
        </div>
        <div class="sh-row"><span id="sec-msg" style="font-size:10px;color:var(--jarvis-glow);min-height:1.1em;"></span></div>
      </div>

      <!-- Communication mini-panel (shown/hidden by 💬 button) -->
      <div id="comm-panel-hud" class="sh-panel" hidden>
        <div class="sh-row">
          <span id="comm-unread" style="font-size:11px;letter-spacing:.08em;color:var(--jarvis-primary);flex:1;">iMessage — · Telegram —</span>
          <button class="sh-close-btn" id="comm-panel-close" type="button">✕</button>
        </div>
        <div class="sh-row">
          <button class="sh-btn" id="comm-missed" type="button">📞 Verpasst</button>
          <button class="sh-btn" id="comm-dnd"    type="button">🔔 DND</button>
        </div>
        <div class="sh-row">
          <input id="comm-tr" type="text" placeholder="Übersetzen…" autocomplete="off"
                 style="flex:1;background:rgba(0,20,40,.6);border:1px solid rgba(0,212,255,.3);color:#cfefff;padding:4px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;" />
          <button class="sh-btn comm-tr-go" data-to="en" type="button">→EN</button>
          <button class="sh-btn comm-tr-go" data-to="de" type="button">→DE</button>
        </div>
        <div class="sh-row"><span id="comm-msg" style="font-size:10px;color:var(--jarvis-glow);min-height:1.1em;"></span></div>
      </div>

      <!-- Bottom row: action buttons + input -->
      <div class="bottom-row">
        <div class="hex-buttons no-drag">
          <button class="hex-btn" data-action="music"    title="Music">♪</button>
          <button class="hex-btn" data-action="search"   title="Search">⌕</button>
          <button class="hex-btn" data-action="home"     title="Smart Home">⌂</button>
          <button class="hex-btn" data-action="security" title="Sicherheit">🔒</button>
          <button class="hex-btn" data-action="comm"     title="Kommunikation">💬</button>
          <button class="hex-btn" data-action="cycle"    title="Cycle state (dev)">↻</button>
          <button class="hex-btn kill" data-action="minimize" title="Minimize to orb">✕</button>
        </div>
        <div class="input-wrap">
          <input id="cmd-input" type="text"
                 placeholder="SPEAK OR TYPE A COMMAND…"
                 autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="scripts/hud.js"></script>
  <script type="module" src="scripts/emblem.js"></script>
  <script type="module" src="scripts/visualizer.js"></script>
  <script type="module" src="scripts/app.js"></script>
  <!-- smarthome.js is imported as a module by app.js — no separate tag needed -->
</body>
</html>
